name: ncol-next

on:
  push:
    branches:
      - main

concurrency:
  group: merge-${{ github.ref }}

permissions:
  id-token: write
  contents: read

jobs:
  DeployApp:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHub
          aws-region: us-east-1
      - name: Deploy app
        env:
          TURSO_DB_URL: ${{ secrets.TURSO_DB_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          TURSO_DOLAR_DB_URL: ${{ secrets.TURSO_DOLAR_DB_URL }}
          TURSO_DOLAR_AUTH_TOKEN: ${{ secrets.TURSO_DOLAR_AUTH_TOKEN }}
          WORDPRESS_API_URL: ${{ secrets.WORDPRESS_API_URL }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME || secrets.DOMAIN_NAME }}
          HOSTED_ZONE_ID: ${{ vars.HOSTED_ZONE_ID || secrets.HOSTED_ZONE_ID }}
          YOUR_CF_DISTRIBUTION_ID: ${{ secrets.YOUR_CF_DISTRIBUTION_ID || vars.YOUR_CF_DISTRIBUTION_ID }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET || vars.REVALIDATE_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          npm ci --legacy-peer-deps
          npx sst deploy --stage production
